# Added by the yarn 4.17 migration. Not needed: there are no git-sourced
# dependencies, so this never applies. Uncomment if one is ever added.
# approvedGitRepositories:
#   - "**"

compressionLevel: mixed

enableGlobalCache: false

# Needed to build native dependency addons (utf-8-validate, unrs-resolver).
# Newer yarn disables dependency build scripts by default; this restores them.
enableScripts: true

httpRetry: 3

httpTimeout: 500000

nodeLinker: node-modules

npmScopes:
  fortawesome:
    npmAlwaysAuth: true
    npmAuthToken: "${FONTAWESOME_NPM_AUTH_TOKEN}"
    npmRegistryServer: "https://npm.fontawesome.com/"

yarnPath: .yarn/releases/yarn-4.17.0.cjs
