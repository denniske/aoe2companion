server {
    listen 80;
    server_name
        aoe2companion.com
        app.aoe2companion.com;
    return 301 http://www.aoe2companion.com$request_uri;
}

server {
    listen 80;
    server_name
        aoe4companion.com
        app.aoe4companion.com;
    return 301 http://www.aoe4companion.com$request_uri;
}

server {
    listen 80;
    server_name
        www.aoe2companion.com
        www.aoe4companion.com;

    root /usr/share/nginx/html;
    index index.html;

    # --- SPA routing (ONLY fallback if file truly missing) ---
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Expo assets (JS, fonts, images) ---
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /_expo/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # --- Fonts: correct MIME types ---
    location ~* \.(ttf|otf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        types {
            font/ttf ttf;
            font/otf otf;
            font/woff woff;
            font/woff2 woff2;
        }
    }

    # --- .well-known support ---
    location /.well-known/ {
        allow all;
    }
}
